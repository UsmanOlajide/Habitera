name: habitera
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.0.15
  google_fonts: ^6.2.1
  intl: ^0.20.1
  go_router: ^17.0.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  supabase_flutter: ^2.12.0
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.2.3
  flutter_dotenv: ^6.0.0
  app_links: ^6.4.1
  package_info_plus: ^9.0.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/habitera_icon.png"
  adaptive_icon_background: "#38b6ff"
  adaptive_icon_foreground: "assets/habitera_icon.png"


flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - .env
    
dependency_overrides:
  package_info_plus: 8.1.0
  path_provider_android: 2.2.10
  shared_preferences_android: 2.3.4
  url_launcher_android: 6.3.14